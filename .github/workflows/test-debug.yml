name: Finalize test cleanup

on:
  push:
    branches:
      - feat/external-db-authz-integration

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/external-db-authz-integration
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Fix raw JSON literals and remove debug workflow
        run: |
          sed -i 's/\\"/"/g' pkg/web/protocol_test.go
          rm .github/workflows/test-debug.yml
          gofmt -w pkg/web/protocol_test.go
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add pkg/web/protocol_test.go .github/workflows/test-debug.yml
          git commit -m "test(web): finalize protocol test isolation"
          git push origin HEAD:feat/external-db-authz-integration
      - run: go test ./... -count=1

name: Test debug

on:
  push:
    branches:
      - feat/external-db-authz-integration

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - id: test
        continue-on-error: true
        run: go test ./... -count=1 > /tmp/test.log 2>&1
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soft-test-log
          path: /tmp/test.log
      - if: steps.test.outcome == 'failure'
        run: exit 1
